<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Enviar Dinero</title>
  <!-- Bootstrap 5.3.0 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
  <!-- Estilos de jQuery UI para el menú de autocompletar -->
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="css/sendmoney.css">
</head>
<body>
  <div class="wallet-card">
    <h2 class="wallet-title text-center">Enviar Dinero</h2>

    <!-- Visualización del Saldo Actual -->
    <div class="text-center mb-4 p-3 rounded" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);">
      <small class="text-secondary d-block mb-1">Saldo Disponible</small>
      <span id="currentBalance" class="fs-3 fw-bold text-white">$150.000</span>
    </div>

    <form id="sendForm">
      <div class="mb-3">
        <label for="searchContact" class="form-label text-light">Buscar o elegir de la agenda:</label>
        <input type="text" class="form-control form-control-custom" id="searchContact" name="searchContact" placeholder="Buscar contacto por nombre o CBU" required>
      </div>
      
      <button type="button" id="addContactBtn" class="wallet-btn-secondary mt-0 mb-4 py-2" style="font-size: 0.9rem;">Agregar nuevo contacto</button>
      
      <h3 class="h6 mb-3 text-light-50">Contactos</h3>
      <ul id="contactList" class="list-group mb-4">
        <!-- Los contactos se cargarán dinámicamente desde JS -->
      </ul>

      <!-- Nuevo campo: Monto a enviar -->
      <div class="mb-4">
        <label for="amount" class="form-label text-light">Monto a enviar:</label>
        <input type="number" class="form-control form-control-custom" id="amount" name="amount" placeholder="Ingresar monto (min. $1)" min="1" required>
      </div>
      
      <button type="submit" class="wallet-btn">Enviar dinero</button>
    </form>
    
    <div class="wallet-hr"></div>
    
    <a href="menu.html" class="wallet-btn-secondary text-center">Volver al Menú Principal</a>
  </div>

  <!-- Modal para Agregar Contacto (Glassmorphism) -->
  <div id="addContactModal" class="modal-overlay">
    <div class="modal-content-custom">
      <h3 class="wallet-title h5 text-center mb-4">Agregar Nuevo Contacto</h3>
      <form id="addContactForm">
        <div class="mb-3">
          <label for="contactNameInput" class="form-label text-light">Nombre y Apellido:</label>
          <input type="text" class="form-control form-control-custom" id="contactNameInput" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="mb-3">
          <label for="contactCbuInput" class="form-label text-light">Número de CBU:</label>
          <input type="text" class="form-control form-control-custom" id="contactCbuInput" placeholder="Ej: 123456789" required>
        </div>
        <div class="mb-3">
          <label for="contactAliasInput" class="form-label text-light">Alias:</label>
          <input type="text" class="form-control form-control-custom" id="contactAliasInput" placeholder="Ej: juan.perez" required>
        </div>
        <div class="mb-3">
          <label for="contactBankInput" class="form-label text-light">Nombre del Banco:</label>
          <input type="text" class="form-control form-control-custom" id="contactBankInput" placeholder="Ej: Banco Santander" required>
        </div>
        
        <div class="d-flex gap-2 mt-4">
          <button id="transa" type="submit" class="wallet-btn w-50">Guardar</button>
        </div>
      </form>
    </div>
  </div>

   <!-- Mensaje de redireccionamiento-->
  <script>
    document.getElementById("transa").addEventListener("click", () => { alert("Redirigiendo a: Enviar dinero") });
  </script>

  <!-- Carga de jQuery y jQuery UI para la función de autocompletar -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- Vinculación del script con el validador y flujo de envío -->
  <script src="js/sendmoney.js"></script>
</body>
</html>
