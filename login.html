<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN Alke Wallet</title>
  <!-- Bootstrap 5.3.0 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>
  <div class="wallet-card">
    <!-- Icono de Billetera Digital -->
    <div class="icon-wrapper">
      <img src="img/sparkle_wallet_icon.png" alt="Billetera" style="width: 45px; height: 45px; object-fit: contain;">
    </div>
    <h2 class="wallet-title text-center">Login</h2>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label text-light">Email:</label>
        <input type="email" class="form-control form-control-custom" id="email" name="email"
          placeholder="Ingresa tu email" required>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label text-light">Contraseña:</label>
        <input type="password" class="form-control form-control-custom" id="password" name="password"
          placeholder="Ingresa tu contraseña" required minlength="4">
      </div>

      <!-- Mensaje de error -->
      <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>

      <!-- Botón de Login -->
      <button id="botondelogin" type="submit" class="wallet-btn text-center">Login</button>
    </form>

    <div class="wallet-hr"></div>

    <footer class="wallet-footer text-center">
      <p class="mb-0">&copy; 2026 Mi sitio WEB versión Beta.<br>Todos los derechos reservados.</p>
    </footer>
  </div>
  <script src="./js/login.js"></script>
</body>

</html>
