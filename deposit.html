<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depositar - Alke Wallet</title>
  <!-- Bootstrap 5.3.0 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="css/deposit.css">
</head>

<body>
  <div class="wallet-card">
    <h2 class="wallet-title text-center">Depositar</h2>

    <!-- Visualización del Saldo Actual -->
    <div class="text-center mb-4 p-3 rounded"
      style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);">
      <small class="text-secondary d-block mb-1">Saldo Actual</small>
      <span id="currentBalance" class="fs-3 fw-bold text-white">$0,00</span>
    </div>

    <form id="depositForm">
      <div class="mb-4">
        <label for="depositAmount" class="form-label text-light">Monto a depositar:</label>
        <input type="number" class="form-control form-control-custom" id="depositAmount" name="depositAmount"
          placeholder="Ingresar monto (min. $1)" min="1" required>
      </div>

      <button id="botondedeposito" type="submit" class="wallet-btn">Realizar depósito</button>


    </form>

    <!-- Mensaje de Feedback -->
    <div id="depositFeedback" class="mt-3 text-center p-2 rounded" style="display: none; font-size: 0.9rem;"></div>

    <div class="wallet-hr"></div>

    <a href="menu.html" class="wallet-btn-secondary text-center">Volver al Menú Principal</a>
  </div>

  <!-- Vinculación del script con las funciones de saldo -->
  <script src="js/deposit.js"></script>

</body>

</html>
